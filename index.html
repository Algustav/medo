<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0d1117">
  <title>meDo</title>
  <link rel="icon" href="./public/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="./public/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./public/favicon-16.png">
  <link rel="apple-touch-icon" href="./public/apple-touch-icon.png">
  <link rel="stylesheet" href="./src/styles/app.css?v=20260629e">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">MY TASKS</p>
        <h1>meDo</h1>
        <p class="subtitle">给任务贴标签，拖动排序；离线可用，在线同步。</p>
      </div>

      <label class="theme-control">
        <span>主题</span>
        <select id="themeSelect" aria-label="选择主题"></select>
      </label>
    </header>

    <form class="composer" id="todoForm">
      <div class="fields">
        <input id="todoTitle" name="title" autocomplete="off" maxlength="200" placeholder="新增任务" required>
        <div class="composer-detail-row">
          <textarea id="todoNote" name="note" maxlength="2000" placeholder="添加备注"></textarea>
          <div class="composer-side">
            <div class="tag-input-wrap">
              <input id="todoTags" name="tags" autocomplete="off" maxlength="200" placeholder="添加标签">
              <div class="tag-suggestions" id="tagSuggestions" hidden></div>
            </div>
            <div class="form-actions">
              <button class="cancel-edit-button" id="cancelEditButton" type="button" aria-label="取消编辑" title="取消编辑" hidden>×</button>
              <button class="add-button" type="submit" aria-label="添加" title="添加">+</button>
            </div>
          </div>
        </div>
      </div>
    </form>

    <section class="controls" aria-label="任务筛选">
      <div class="filter-tabs" id="statusFilters">
        <button class="filter active" type="button" data-status="active">待办</button>
        <button class="filter" type="button" data-status="important" title="重要">∭</button>
        <button class="filter" type="button" data-status="all">全部</button>
        <button class="filter" type="button" data-status="done">已完成</button>
        <button class="filter" type="button" data-status="archived">归档</button>
        <button class="sort-button compact" id="sortButton" type="button" aria-label="排序：新任务在前" title="排序：新任务在前">∨</button>
      </div>
      <div class="sync-cluster">
        <span class="sync-status" id="syncStatus" role="status">连接中</span>
        <button class="sync-button compact" id="syncButton" type="button" title="同步到云端">↻ 同步</button>
      </div>
    </section>

    <nav class="tag-filters" id="tagFilters" aria-label="按标签筛选"></nav>

    <div class="toolbar">
      <span id="todoCount">0 个待办</span>
      <button class="secondary compact hidden-action" id="clearDoneButton" type="button">清除已完成</button>
    </div>

    <ol class="list" id="todoList"></ol>
    <div class="empty" id="emptyState">暂无任务。</div>
  </main>

  <template id="todoItemTemplate">
    <li class="item">
      <div class="item-tools">
        <button class="drag-handle" type="button" aria-label="拖动排序" title="拖动排序">⋮</button>
        <button class="importance-button" type="button" aria-label="重要性：一级" title="重要性：一级">∫</button>
      </div>
      <input class="check" type="checkbox">
      <div class="content">
        <strong class="title"></strong>
        <span class="note"></span>
        <div class="tags"></div>
        <form class="tag-editor" hidden>
          <input class="tag-editor-input" maxlength="200" aria-label="任务标签" placeholder="标签，用逗号分隔">
          <button class="compact" type="submit">保存</button>
          <button class="secondary compact cancel-tags" type="button">取消</button>
        </form>
      </div>
      <button class="tag-button" type="button" aria-label="编辑标签" title="编辑标签">#</button>
      <button class="archive-button" type="button" aria-label="归档任务" title="归档任务">⇲</button>
    </li>
  </template>

  <script type="module" src="./src/app.js?v=20260629e"></script>
</body>
</html>
